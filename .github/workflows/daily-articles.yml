name: Publish Daily SEO Articles

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workflow commit
        run: |
          echo "Running workflow for commit: $GITHUB_SHA"
          git log --oneline -n 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Get next keyword from queue
        id: keyword
        run: |
          keyword="$(node scripts/get-next-keyword.js --field keyword --allow-empty)"
          slug="$(node scripts/get-next-keyword.js --field slug --allow-empty)"

          if [ -z "$keyword" ] || [ -z "$slug" ]; then
            echo "has_entry=false" >> "$GITHUB_OUTPUT"
            echo "No eligible keyword scheduled for publishing right now."
          else
            echo "has_entry=true" >> "$GITHUB_OUTPUT"
            echo "keyword=$keyword" >> "$GITHUB_OUTPUT"
            echo "slug=$slug" >> "$GITHUB_OUTPUT"
          fi

      - name: Nothing to publish
        if: steps.keyword.outputs.has_entry != 'true'
        run: echo "Skipping publish run because there is no eligible queued article."

      - name: Generate and publish article
        if: steps.keyword.outputs.has_entry == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSC_SERVICE_ACCOUNT: ${{ secrets.GSC_SERVICE_ACCOUNT }}
        run: |
          node scripts/generate-article.js --keyword "${{ steps.keyword.outputs.keyword }}" --slug "${{ steps.keyword.outputs.slug }}"

      - name: Commit and push new article
        if: steps.keyword.outputs.has_entry == 'true'
        run: |
          git config --global user.email "bot@stylescore.live"
          git config --global user.name "StyleScore Bot"
          git add .
          git commit -m "feat: publish article for ${{ steps.keyword.outputs.keyword }}" || echo "Nothing to commit"
          git push

      - name: Deployment note
        if: steps.keyword.outputs.has_entry == 'true'
        run: echo "Article committed to main. Vercel will deploy from the Git push."
